<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#9f201c" />
    <meta
      name="description"
      content="Comande locali per i tavoli de La Sagretta. I dati restano su questo dispositivo."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>La Sagretta · Comande</title>
  </head>
  <body>
    <header class="app-header">
      <button class="brand" type="button" data-action="show-tables" aria-label="Vai ai tavoli">
        <span class="brand-mark">LS</span>
        <span>
          <strong>La Sagretta</strong>
          <small>Comande</small>
        </span>
      </button>
      <nav class="main-nav" aria-label="Navigazione principale">
        <button class="nav-button active" type="button" data-action="show-tables">
          Tavoli
        </button>
        <button class="nav-button" type="button" data-action="show-ready">
          Pronti <span id="ready-count" class="count-badge">0</span>
        </button>
      </nav>
    </header>

    <main id="app" tabindex="-1"></main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog">
        <h2 id="confirm-title">Conferma</h2>
        <p id="confirm-message"></p>
        <div class="dialog-actions">
          <button class="button button-secondary" value="cancel">Annulla</button>
          <button id="confirm-button" class="button button-danger" value="confirm">
            Conferma
          </button>
        </div>
      </form>
    </dialog>

    <noscript>Per usare l’app è necessario attivare JavaScript.</noscript>
    <script src="app.js" defer></script>
  </body>
</html>
